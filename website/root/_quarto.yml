project:
  type: book
  resources:
    - llms.txt
    - llms-full.txt

execute:
  cache: true
  freeze: auto # re-render only when source changes

book:
  favicon: assets/favicon.ico
  title: "Model to Meaning"
  subtitle: "How to interpret statistical models with `marginaleffects` for `R` and `Python`"
  site-url: https://marginaleffects.com
  sidebar:
    collapse-level: 1

  navbar:
    background: "#eeeeee"
    search: true
    logo: assets/marginaleffects_logo.svg
    logo-alt: "marginaleffects logo"
    right:
      - text: Quick start
