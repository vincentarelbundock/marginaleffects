format:
  html:
    copyright: "Vincent Arel-Bundock, 2025"
    reader-mode: true
    theme:
      - flatly
      - custom.scss
    top-level-division: chapter
    citeproc: true
    toc: true
    highlight-style: atom-one
    code-copy: true
    code-link: true
    code-overflow: scroll
    bibliography: library.bib
