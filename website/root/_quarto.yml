        href: https://www.jstatsoft.org/article/view/v111i09
      - text: Courses
        href: bonus/courses.html
      - text: Help
        href: bonus/help.html
      - icon: github
        aria-label: marginaleffects GitHub
        href: https://github.com/vincentarelbundock/marginaleffects
      - text: "![](assets/bluesky.svg){height=1em}"
