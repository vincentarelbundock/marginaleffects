name: py-check

on:
  pull_request:
    paths:
      - "python/**"
      - ".scrutin/**"
      - ".github/workflows/py-check.yaml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".scrutin/**"
      - ".github/workflows/py-check.yaml"
  workflow_dispatch:

jobs:
  check-py:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: vincentarelbundock/scrutin/.github/actions/install_tools@main
        with:
          tools: ruff

      - uses: vincentarelbundock/scrutin/.github/actions/check_py@main
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: python
          tool: pytest

      - uses: vincentarelbundock/scrutin/.github/actions/check_py@main
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: python
          sync: "false"
          tool: ruff
