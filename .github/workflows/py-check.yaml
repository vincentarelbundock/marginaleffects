name: py-check

on:
  pull_request:
    paths:
      - "python/**"
      - ".scrutin/**"
      - ".github/workflows/py-check.yaml"
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".scrutin/**"
      - ".github/workflows/py-check.yaml"
  workflow_dispatch:

jobs:
  check-py:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync python deps (with all extras)
        working-directory: python
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - uses: vincentarelbundock/scrutin/.github/actions/install_scrutin@v0.0.11

      - name: scrutin pytest
        run: scrutin -r github --set run.tool=pytest

      - name: scrutin ruff
        run: scrutin -r github --set run.tool=ruff
