name: r-check

on:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"
  _R_CHECK_TESTS_NLINES_: 0
  R_NOT_CRAN: "true"
  R_GH: "true"
  GITHUB_PAT: ${{ secrets.GITHUB_PAT }}

jobs:
  check-r:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # install_r reads DESCRIPTION from the repo root, so hoist r/ contents up.
      - name: Hoist R package to repo root
        shell: bash
        run: |
          shopt -s dotglob
          cp -r r/* .

      - uses: vincentarelbundock/scrutin/.github/actions/install_r@v0.0.11

      - uses: r-lib/actions/setup-tinytex@v2

      - uses: vincentarelbundock/scrutin/.github/actions/install_scrutin@v0.0.11

      - name: R CMD check --no-tests --as-cran
        shell: bash
        working-directory: r
        run: |
          R CMD build .
          R CMD check --no-tests --as-cran *.tar.gz

      - name: scrutin (cheap group)
        shell: bash
        working-directory: r
        run: scrutin -r github -s filter.group=cheap
