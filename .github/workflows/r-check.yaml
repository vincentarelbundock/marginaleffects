name: r-check

on:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"
  _R_CHECK_TESTS_NLINES_: 0
  R_NOT_CRAN: "true"
  R_GH: "true"
  GITHUB_PAT: ${{ secrets.GITHUB_PAT }}

jobs:
  check-r:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # check_r_pkg's nested install_r reads DESCRIPTION from the repo root,
      # so hoist the R package contents up one level before invoking it.
      # The root-level .scrutin/ directory is untouched by the copy.
      - name: Hoist R package to repo root
        shell: bash
        run: |
          shopt -s dotglob
          cp -r r/* .

      - name: R CMD check + scrutin tinytest (cheap group)
        uses: vincentarelbundock/scrutin/.github/actions/check_r_pkg@v0.0.11
        with:
          tool: tinytest
          scrutin-args: -s filter.group=cheap
